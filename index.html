<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<title>GOE Storage Test</title>
<style>body{font-family:monospace;padding:20px;background:#1a1a2e;color:#eee}
table{border-collapse:collapse;width:100%}td,th{border:1px solid #444;padding:8px;text-align:left}
th{background:#333}.ok{color:#4ade80}.null{color:#f87171}.btn{background:#4f46e5;color:#fff;border:none;padding:8px 16px;cursor:pointer;margin:4px;border-radius:6px}</style>
</head><body>
<h2>GOE·Patrimonio — Storage Diagnostic</h2>
<p><b>URL:</b> <span id="url"></span></p>
<p><b>Origin:</b> <span id="origin"></span></p>
<div id="out"></div>
<br>
<button class="btn" onclick="testSave()">Test: Write & Read</button>
<button class="btn" onclick="clearAll()">Clear ALL data</button>
<div id="test-result" style="margin-top:10px"></div>
<script>
document.getElementById('url').textContent = location.href;
document.getElementById('origin').textContent = location.origin;

var keys = ['goe_movs','goe_cuentas','goe_invs','goe_pigs','goe_imms','goe_alts',
            'goe_pasivos','goe_pres','goe_checks','goe_notas','goe_creditos',
            'goe_proyectos','goe_colabs','goe_listas','goe_eventos','goe_aports',
            'goe_proyTareas','goe_reunionesP','goe_valoraciones','g_ok','goe_last_saved'];

function render(){
  var html = '<table><tr><th>Key</th><th>Data</th><th>Items</th></tr>';
  var hasData = 0;
  keys.forEach(function(k){
    var v = localStorage.getItem(k);
    var count = '-';
    try{ var p=JSON.parse(v); if(Array.isArray(p)) count=p.length; }catch(e){}
    var cls = v ? 'ok' : 'null';
    var display = v ? (v.length>100?v.slice(0,100)+'...':v) : 'null';
    if(v) hasData++;
    html += '<tr><td>'+k+'</td><td class="'+cls+'">'+display+'</td><td>'+count+'</td></tr>';
  });
  html += '</table><br><b>Keys with data: '+hasData+' / '+keys.length+'</b>';
  document.getElementById('out').innerHTML = html;
}

function testSave(){
  try{
    localStorage.setItem('goe_test_write', JSON.stringify({ok:true,ts:Date.now()}));
    var read = localStorage.getItem('goe_test_write');
    localStorage.removeItem('goe_test_write');
    document.getElementById('test-result').innerHTML = 
      '<span style="color:#4ade80">✓ localStorage WORKS: wrote and read back: '+read+'</span>';
  }catch(e){
    document.getElementById('test-result').innerHTML = 
      '<span style="color:#f87171">✗ localStorage FAILS: '+e.message+'</span>';
  }
}

function clearAll(){
  if(!confirm('¿Borrar TODOS los datos de GOE? Esta acción no se puede deshacer.')) return;
  keys.forEach(function(k){ localStorage.removeItem(k); });
  localStorage.removeItem('goe_hist_patrimonio');
  localStorage.removeItem('goe_objetivos');
  localStorage.removeItem('goe_cat_limits');
  localStorage.removeItem('goe_dark');
  localStorage.removeItem('goe_cierres');
  render();
  alert('Datos borrados. Recarga la app.');
}

render();
</script>
</body></html>
